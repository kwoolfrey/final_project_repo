on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  run_forecast:
    runs-on: ubuntu-latest
    container:
      image: rqthomas/vera-rocker:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
              
# Point to the right path, run the right Rscript command
      - name: Run automatic forecast submission
        run: Rscript to_automate.R
            
